spring.application.name=todo-spring

# ── MySQL 연결 설정 ──────────────────────────────────────────────────────────
# docker-compose.yml의 mysql 서비스와 동일한 정보여야 한다
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=todo_user
spring.datasource.password=todo1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate 설정 ─────────────────────────────────────────────────────
# update: Entity 변경사항을 테이블에 자동 반영 (데이터는 유지). 개발 환경용.
# 운영 환경에서는 반드시 validate 또는 none으로 변경할 것
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL을 콘솔에 출력 (학습용, 운영에서는 false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL 8.x 방언 (Hibernate가 MySQL 문법에 맞는 쿼리를 생성하도록 지정)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
