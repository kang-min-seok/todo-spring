spring.application.name=todo-spring

# ── MySQL 연결 설정 ──────────────────────────────────────────────────────────
# 환경변수가 있으면 환경변수 값을, 없으면 콜론 뒤의 기본값을 사용한다.
# 로컬: 환경변수 없이 기본값으로 동작
# EC2:  GitHub Actions가 Secrets를 환경변수로 주입
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/todo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:todo_user}
spring.datasource.password=${DB_PASSWORD:todo1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate 설정 ─────────────────────────────────────────────────────
# DDL_AUTO 환경변수가 없으면 update (로컬 개발용 기본값)
# EC2 배포 시 GitHub Secrets에서 validate 또는 none으로 주입
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# SHOW_SQL 환경변수가 없으면 true (로컬 학습용 기본값)
# EC2 배포 시 false로 주입해 불필요한 SQL 로그 제거
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:true}

# MySQL 8.x 방언 (Hibernate가 MySQL 문법에 맞는 쿼리를 생성하도록 지정)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
