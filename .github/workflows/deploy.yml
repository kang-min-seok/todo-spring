name: Deploy to EC2

# main 브랜치에 push될 때 트리거
on:
  push:
    branches: [ main, phase5/ci-cd ]
  workflow_dispatch:   # GitHub UI에서 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub이 제공하는 임시 Linux 서버에서 실행

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 빌드 (테스트 제외, 실행 가능한 JAR 생성)
      # Windows에서 커밋하면 gradlew 실행 권한이 사라지는 경우가 있어 명시적으로 부여
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # 4. SSH 키 설정
      # printf 사용: echo는 개행 처리가 불안정해 키 파일이 깨질 수 있음
      # StrictHostKeyChecking=no: known_hosts 검증 생략 (학습용 환경)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # 5. 기존 앱 프로세스 종료
      - name: Stop existing application
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "pkill -f 'todo-spring' || true && sleep 2"

      # 6. JAR 파일 전송
      - name: Copy JAR to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            build/libs/*.jar \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/app/

      # 7. EC2에서 새 버전 실행
      - name: Start Application
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            nohup env \
              DB_URL="${{ secrets.DB_URL }}" \
              DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              DDL_AUTO="${{ secrets.DDL_AUTO }}" \
              SHOW_SQL="${{ secrets.SHOW_SQL }}" \
              java -jar ~/app/todo-spring-*.jar \
              > ~/app/app.log 2>&1 &
            echo "배포 완료"
          EOF