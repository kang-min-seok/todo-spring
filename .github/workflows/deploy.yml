name: Deploy to EC2

on:
  push:
    branches: [ main, phase5/ci-cd ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 빌드 (테스트 제외, 실행 가능한 JAR 생성)
      # Windows에서 커밋하면 gradlew 실행 권한이 사라지는 경우가 있어 명시적으로 부여
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # 4. AWS 자격증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드 후 ECR push
      # GitHub Actions 러너(고사양)에서 빌드하므로 EC2 부하 없음
      - name: Build and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cp build/libs/*.jar app.jar
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 7. SSH 키 설정
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # 8. deploy.sh를 프로젝트에서 관리하므로 SCP로 함께 전송
      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
            deploy.sh \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/app/
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "chmod +x ~/app/deploy.sh"

      # 9. Blue-Green 배포 실행
      - name: Deploy to EC2 (Blue-Green)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "cd ~/app && ./deploy.sh ${{ steps.build-image.outputs.image }}"

      # 10. Discord 성공 알림
      - name: Discord 성공 알림
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ 배포 성공",
                "description": "'"${{ github.repository }}"' — '"${{ github.ref_name }}"'",
                "color": 3066993
              }]
            }'

      # 11. Discord 실패 알림
      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ 배포 실패",
                "description": "'"${{ github.repository }}"' — '"${{ github.ref_name }}"'",
                "color": 15158332
              }]
            }'
